name: Build & Test
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-gcc
          - os: windows-latest
            name: windows-msvc
          - os: macos-latest
            name: macos-clang
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build g++-14 libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxext-dev libxfixes-dev libgl1-mesa-dev libglu1-mesa-dev pkg-config libgtk-3-dev
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
        sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++-14 100

    - name: Install Dependencies (Windows)
      if: runner.os == 'Windows'
      run: choco install ninja

    - name: Configure CMake (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install llvm ninja
        LLVM_PATH="$(brew --prefix llvm)"
        cmake -B build -G Ninja \
          -D CMAKE_BUILD_TYPE=Release \
          -D CMAKE_C_COMPILER="$LLVM_PATH/bin/clang" \
          -D CMAKE_CXX_COMPILER="$LLVM_PATH/bin/clang++" \
          -D CMAKE_CXX_FLAGS="-stdlib=libc++"

    - name: Setup MSVC Developer Command Prompt (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure CMake
      if: runner.os != 'macOS'
      run: cmake -B build -G Ninja -D CMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --parallel

    - name: Test
      run: ctest --test-dir build --build-config Release --output-on-failure --parallel